<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Puddly</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <button id="btn-quit" class="interactive quit-button" aria-label="Quit Puddly">×</button>

    <!-- Speech bubble popup, marked as interactive to capture mouse events -->
    <div id="speech-bubble" class="interactive">
        <div id="speech-text"></div>
        <div id="button-container">
            <button id="btn-drank" class="interactive">💧 I Drank</button>
            <button id="btn-snooze" class="interactive">😴 Snooze</button>
        </div>
        <div class="speech-arrow"></div>
    </div>

    <!-- Character images container for smooth cross-fading -->
    <div id="character-container">
        <img id="puddly-img-1" class="character-img visible" src="../assets/standing.png" draggable="false">
        <img id="puddly-img-2" class="character-img hidden" src="../assets/standing.png" draggable="false">
    </div>

    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            console.log("CRITICAL ERROR: " + message + " (line " + lineno + ", col " + colno + ")");
            if (error && error.stack) {
                console.log("Stack: " + error.stack);
            }
        };
    </script>
    <script src="script.js" onerror="console.log('SCRIPT.JS LOAD ERROR: Failed to load file from disk!')"></script>
    <script src="character.js"></script>
  
</body>

</html>
