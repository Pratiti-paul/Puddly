<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Puddly</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="puddly-container">
        <div class="companion-container interactive draggable">

            <!-- Speech Bubble -->
            <div id="speech-bubble">

                <div id="speech-text">
                    Hiii gurlll! 💕<br>
                    It's time for some water 💧
                </div>

                <div class="speech-arrow"></div>

            </div>

            <!-- Character -->
            <div id="character-container">

                <img
                    id="puddly-img-1"
                    class="character-img visible"
                    src="../assets/standing.png"
                    draggable="false"
                >

                <img
                    id="puddly-img-2"
                    class="character-img hidden"
                    src="../assets/standing.png"
                    draggable="false"
                >

            </div>

            <!-- Buttons -->
            <div id="button-container" class="interactive">

                <button id="btn-drank">
                    💧 I Drank
                </button>

                <button id="btn-snooze">
                    😴 Snooze
                </button>

            </div>

        </div>

    </div>

    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            console.log("CRITICAL ERROR:", message);

            if (error) {
                console.error(error);
            }
        };
    </script>

    <script src="script.js"></script>

</body>

</html>
